<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Antenna -->
  <line x1="150" y1="40" x2="150" y2="65" stroke="#ffdb6f" stroke-width="6" />
  <circle cx="150" cy="30" r="12" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <rect x="136" y="65" width="28" height="14" rx="7" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <!-- Head -->
  <rect x="50" y="80" width="200" height="100" rx="40" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <!-- Head sides/ears -->
  <ellipse cx="50" cy="130" rx="16" ry="20" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <ellipse cx="250" cy="130" rx="16" ry="20" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <!-- Eye panel -->
  <rect x="86" y="112" width="128" height="54" rx="27" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <!-- Eyes -->
  <circle cx="118" cy="139" r="13" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <circle cx="182" cy="139" r="13" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <!-- Neck connectors -->
  <rect x="110" y="180" width="12" height="18" rx="6" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <rect x="178" y="180" width="12" height="18" rx="6" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <!-- Body -->
  <rect x="70" y="210" width="160" height="72" rx="26" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <!-- Body panel -->
  <rect x="102" y="235" width="96" height="36" rx="18" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <!-- Body buttons -->
  <circle cx="124" cy="253" r="7" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <circle cx="150" cy="253" r="7" stroke="#ffdb6f" stroke-width="6" fill="none"/>
  <circle cx="176" cy="253" r="7" stroke="#ffdb6f" stroke-width="6" fill="none"/>
</svg>
